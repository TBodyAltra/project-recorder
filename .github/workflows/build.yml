name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm --clean
        continue-on-error: true

      - name: Upload artifact on failure
        if: failure()
        run: |
          echo "Build failed. Listing dist directory:"
          if (Test-Path "ProjectRecorder/dist") { dir "ProjectRecorder/dist" /s }
          echo "Build logs:"
          Get-ChildItem -Path . -Filter "*.log" -Recurse | ForEach-Object { Write-Host "=== $($_.FullName) ==="; Get-Content $_.FullName }

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ProjectRecorder/dist/ProjectRecorder.exe
            ProjectRecorder/dist/**/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ProjectRecorder
          path: |
            ProjectRecorder/dist/
            *.log
          retention-days: 30
