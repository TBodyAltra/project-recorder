name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm --clean
        continue-on-error: true

      - name: Debug dist directory
        run: |
          if (Test-Path "ProjectRecorder/dist") {
            Write-Host "=== DIST DIRECTORY CONTENTS ==="
            Get-ChildItem "ProjectRecorder/dist" -Recurse | Format-Table FullName, Length
            Write-Host "Total files: $((Get-ChildItem 'ProjectRecorder/dist' -Recurse).Count)"
          } else {
            Write-Host "ProjectRecorder/dist does NOT exist!"
            Write-Host "=== CURRENT DIRECTORY ==="
            Get-ChildItem . | Format-Table Name
            Write-Host "=== Checking for any .exe ==="
            Get-ChildItem . -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName
          }

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ProjectRecorder/dist/ProjectRecorder.exe
            ProjectRecorder/dist/**/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRecorder
          path: ProjectRecorder/dist/
          retention-days: 30
